name: Daily Auto Commit

on:
  schedule:
    - cron: '30 9 * * *'   # Runs daily at 9:30 UTC (specific minute & hour)
  workflow_dispatch:        # Allows manual trigger

permissions:
  contents: write
  
jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: 23f2005292@ds.study.iitm.ac.in - Update file
        run: |
          echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "23f2005292@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit"
          git push
